services:
  api:
    container_name: cms-api
    build: 
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./api:/var/www
    depends_on:
      - database

  controller:
    image: nginx:alpine  
    container_name: cms-controller
    volumes:
      - ./api:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    depends_on:
      - api

  database:
    image: mysql:8.4
    container_name: cms-database
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: customer_management
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: